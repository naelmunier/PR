name: Build & Push branche deploy

on:
  push:
    branches:
      - main   # se déclenche à chaque push sur main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # nécessaire pour pousser dans la branche deploy

    steps:
      # 1. Récupérer le code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Installer Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Installer les dépendances
      - name: Installer les dépendances
        run: npm ci

      # 4. Builder le site Astro → génère le dossier dist/
      - name: Build Astro
        run: npm run build

      # 5. Pousser le contenu de dist/ dans la branche deploy
      #    GITHUB_TOKEN est fourni automatiquement par GitHub, aucun secret à créer
      - name: Publier dans la branche deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./dist
          publish_branch: deploy
          force_orphan: true   # branche deploy = uniquement les fichiers buildés, propre
